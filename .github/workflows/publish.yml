name: Publish

on:
  release:
    types:
      - published

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm run check

      - name: Check package versions
        run: pnpm run check:versions

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Check package contents
        run: pnpm run check:packages

      - name: Create npm package
        run: |
          npm pack --json --pack-destination "$GITHUB_WORKSPACE" > npm-pack.json
          filename="$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('npm-pack.json', 'utf8'))[0].filename)")"
          echo "NPM_TARBALL=$GITHUB_WORKSPACE/$filename" >> "$GITHUB_ENV"
        working-directory: packages/language-server

      - name: Create VSIX package
        run: |
          pnpm --filter riot-v3-language-features run pack
          version="$(node -p "require('./packages/vscode/package.json').version")"
          echo "VSIX=$GITHUB_WORKSPACE/packages/vscode/riot-v3-language-features-$version.vsix" >> "$GITHUB_ENV"

      - name: Create checksums
        run: shasum -a 256 "$NPM_TARBALL" "$VSIX" > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            ${{ env.NPM_TARBALL }}
            ${{ env.VSIX }}
            checksums.txt

  publish-npm:
    name: Publish npm Package
    runs-on: ubuntu-latest
    needs: package
    environment: release
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Locate artifacts
        run: |
          npm_tarball="$(find release-artifacts -maxdepth 1 -name '*.tgz' -type f | head -n 1)"
          vsix="$(find release-artifacts -maxdepth 1 -name '*.vsix' -type f | head -n 1)"
          if [ -z "$npm_tarball" ] || [ -z "$vsix" ]; then
            echo "Release artifacts were not found." >&2
            exit 1
          fi
          echo "NPM_TARBALL=$npm_tarball" >> "$GITHUB_ENV"
          echo "VSIX=$vsix" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish npm package
        run: npm publish "$NPM_TARBALL" --provenance --access public

  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: package
    environment: release

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Locate VSIX
        run: |
          vsix="$(find release-artifacts -maxdepth 1 -name '*.vsix' -type f | head -n 1)"
          if [ -z "$vsix" ]; then
            echo "VSIX artifact was not found." >&2
            exit 1
          fi
          echo "VSIX=$vsix" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install vsce
        run: npm install --global @vscode/vsce@3.9.2

      - name: Publish VS Code extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --packagePath "$VSIX" --pat "$VSCE_PAT"

  attach-artifacts:
    name: Attach Artifacts
    runs-on: ubuntu-latest
    needs:
      - publish-npm
      - publish-vscode
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Attach artifacts to GitHub Release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" release-artifacts/* --clobber
